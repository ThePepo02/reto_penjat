<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Ahorcado</title>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
</head>

<body>
    <!-- Pantalla 1: El usuario escribe el nombre-->
    <div id="pantalla-inicio" class="pantalla activa">
        <h1>El Ahorcado</h1>
        <input type="text" id="input-nombre" placeholder="Tu nombre..." />
        <button id="btn-jugar">¡Jugar!</button>
    </div>

    <!-- Pantalla 2: El juego en si -->
    <div id="pantalla-juego" class="pantalla">
        <p id="display-categoria">Categoria: </p>
        <p id="display-errores">Errores: 0 / 6</p>
        <div id="mascara-palabra"></div>
        <div id="teclado"></div>


        <!-- El dibujo del ahorcado -->
        <svg id="svg-ahorcado" viewBox="0 0 200 220" width="200" height="220">
            <!-- La horca (siempre visible) -->
            <line x1="10" y1="210" x2="190" y2="210" stroke="black" stroke-width="4" />
            <line x1="60" y1="210" x2="60" y2="10" stroke="black" stroke-width="4" />
            <line x1="60" y1="10" x2="130" y2="10" stroke="black" stroke-width="4" />
            <line x1="130" y1="10" x2="130" y2="40" stroke="black" stroke-width="4" />

            <!-- Partes del cuerpo (ocultas por defecto) -->
            <circle id="parte-0" cx="130" cy="55" r="15" stroke="black" stroke-width="4" fill="none"
                style="display:none" />
            <line id="parte-1" x1="130" y1="70" x2="130" y2="130" stroke="black" stroke-width="4"
                style="display:none" />
            <line id="parte-2" x1="130" y1="85" x2="105" y2="110" stroke="black" stroke-width="4"
                style="display:none" />
            <line id="parte-3" x1="130" y1="85" x2="155" y2="110" stroke="black" stroke-width="4"
                style="display:none" />
            <line id="parte-4" x1="130" y1="130" x2="105" y2="165" stroke="black" stroke-width="4"
                style="display:none" />
            <line id="parte-5" x1="130" y1="130" x2="155" y2="165" stroke="black" stroke-width="4"
                style="display:none" />
        </svg>

    </div>


    <!-- Pantalla 3: Fin del juego -->
    <div id="pantalla-fin" class="pantalla">
        <h2 id="fin-resultado"></h2>
        <button id="btn-reiniciar">¡Volver a jugar!</button>
    </div>

</body>

</html>

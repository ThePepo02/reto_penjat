<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Ahorcado</title>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
</head>

<body>
    <!-- Pantalla 1: El usuario escribe el nombre-->
    <div id="pantalla-inicio" class="pantalla activa">
        <h1>El Ahorcado</h1>
        <p>¡Adivina la palabra antes de que sea demasiado tarde!</p>
        <div class="campo-nombre">
            <input type="text" id="input-nombre" placeholder="Tu nombre..." />
            <button id="btn-jugar">¡Jugar!</button>
        </div>
    </div>

    <!-- Pantalla 2: El juego en si -->
    <div id="pantalla-juego" class="pantalla">

        <!-- Cabecera -->
        <div class="juego-header">
            <p id="display-categoria">Categoria: </p>
            <p id="display-errores">Errores: 0 / 6</p>
            <p id="display-tiempo"></p>
        </div>

        <!-- Zona principal -->
        <div class="juego-main">

            <!-- Columna izquierda: ahorcado -->
            <div class="col-ahorcado">
                <svg id="svg-ahorcado" viewBox="0 0 200 220" width="200" height="220">
                    <line class="estructura" x1="10" y1="210" x2="190" y2="210" stroke-width="4" />
                    <line class="estructura" x1="60" y1="210" x2="60" y2="10" stroke-width="4" />
                    <line class="estructura" x1="60" y1="10" x2="130" y2="10" stroke-width="4" />
                    <line class="estructura" x1="130" y1="10" x2="130" y2="40" stroke-width="4" />
                    <circle class="cuerpo" id="parte-0" cx="130" cy="55" r="15" fill="none" stroke-width="4"
                        style="display:none" />
                    <line class="cuerpo" id="parte-1" x1="130" y1="70" x2="130" y2="130" stroke-width="4"
                        style="display:none" />
                    <line class="cuerpo" id="parte-2" x1="130" y1="85" x2="105" y2="110" stroke-width="4"
                        style="display:none" />
                    <line class="cuerpo" id="parte-3" x1="130" y1="85" x2="155" y2="110" stroke-width="4"
                        style="display:none" />
                    <line class="cuerpo" id="parte-4" x1="130" y1="130" x2="105" y2="165" stroke-width="4"
                        style="display:none" />
                    <line class="cuerpo" id="parte-5" x1="130" y1="130" x2="155" y2="165" stroke-width="4"
                        style="display:none" />
                </svg>
            </div>

            <!-- Columna derecha: palabra y teclado -->
            <div class="col-juego">
                <div id="mascara-palabra"></div>
                <div id="teclado"></div>
            </div>

        </div>
    </div>


    <!-- Pantalla 3: Fin del juego -->
    <div id="pantalla-fin" class="pantalla">
        <h2 id="fin-resultado"></h2>
        <button id="btn-reiniciar">¡Volver a jugar!</button>
    </div>

</body>

</html>
